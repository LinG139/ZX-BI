spring:
  profiles:
    active: dev
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  session:
    timeout: 2592000
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/liubi
    username: root
    password: 345678

  redis:
    database: 1
    host: localhost
    port: 6379
    timeout: 5000
    password: 345678
  rabbitmq:
    host: localhost
    port: 5672
    password: guest
    username: guest
  # 文件上传
  servlet:
    multipart:
      # 大小限制
      max-file-size: 10MB
      max-request-size: 10MB

# 文件存储配置
file:
  upload:
    path: uploads/avatars/
  access:
    url: http://localhost:9001/api/file/avatar/

server:
  port: 9001
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value:  0

# AI配置
ai:
  provider: zhipu

# 对象存储
